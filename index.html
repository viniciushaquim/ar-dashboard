<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Propaganda — AI Team Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', Arial, sans-serif; background: #F5F2EF; padding: 40px 20px; }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: #1A1A1A; margin-bottom: 40px; font-size: 28px; }
    .agents { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .agent { background: white; padding: 24px; border-radius: 12px; border: 1px solid #E8E3DE; }
    .agent-avatar { font-size: 48px; margin-bottom: 12px; }
    .agent-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; color: #1A1A1A; }
    .agent-role { color: #6B6B6B; font-size: 14px; margin-bottom: 12px; }
    .status { display: inline-block; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .status.online { background: #E6F9ED; color: #15803D; }
    .status.idle { background: #FEF3C7; color: #A16207; }
    .status.offline { background: #F3F4F6; color: #374151; }
    .last-task { margin-top: 16px; padding-top: 16px; border-top: 1px solid #E8E3DE; }
    .last-task-label { font-size: 11px; color: #6B6B6B; text-transform: uppercase; margin-bottom: 4px; }
    .last-task-text { font-size: 14px; color: #1A1A1A; }
    .last-task-time { font-size: 12px; color: #6B6B6B; margin-top: 4px; }
    .update-time { margin-top: 40px; font-size: 12px; color: #6B6B6B; }
  </style>
</head>
<body>
<div class="container">
  <h1>🦞 AR Propaganda — AI Team Dashboard</h1>
  <div class="agents" id="agents">
    <div class="agent">Carregando...</div>
  </div>
  <div class="update-time" id="update-time">Atualizado: --:--:--</div>
</div>
<script>
async function loadDashboard() {
  try {
    const res = await fetch('/api/dashboard-data');
    const data = await res.json();
    console.log('Dados:', data);
    
    if (!data.agentes || !Array.isArray(data.agentes)) {
      document.getElementById('agents').innerHTML = '<div class="agent">Erro: Formato inesperado</div>';
      return;
    }
        document.getElementById('agents').innerHTML = data.agentes.map(a => `
      <div class="agent">
        <div class="agent-avatar">${a.avatar || '👤'}</div>
        <div class="agent-name">${a.name}</div>
        <div class="agent-role">${a.role}</div>
        <div class="status ${a.status}">
          ${a.status === 'online' ? '🟢' : a.status === 'idle' ? '🟡' : '⚪'} ${a.status.toUpperCase()}
        </div>
        <div class="last-task">
          <div class="last-task-label">Última Tarefa</div>
          <div class="last-task-text">${a.lastTask || 'Sem dados'}</div>
          <div class="last-task-time">${a.lastTaskTime || '--:--'}</div>
        </div>
      </div>
    `).join('');
    
    document.getElementById('update-time').textContent = 'Atualizado: ' + new Date().toLocaleTimeString('pt-BR');
  } catch (e) {
    console.error('Erro:', e);
    document.getElementById('agents').innerHTML = '<div class="agent">Erro ao carregar</div>';
  }
}
loadDashboard();
setInterval(loadDashboard, 30000);
</script>
</body>
</html>
